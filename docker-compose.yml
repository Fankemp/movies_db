services:
  db_movie:
    image: postgres:alpine
    container_name: movies_service
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
    -  "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web-app:
    build: .
    container_name: movies_app
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_HOST: db_movie
      DB_PORT: 5432
      DB_URL: postgres://${DB_USER}:${DB_PASSWORD}@db_movie:5432/${DB_NAME}?sslmode=disable
    depends_on:
      db_movie:
        condition: service_healthy
volumes:
  postgres_data:
    name: movies_postgres_data